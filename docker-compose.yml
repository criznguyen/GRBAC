# GRBAC — local dev / SME single-node
# Usage: docker compose up -d
# API: http://localhost:8080  (health: /health)
# Migrations run automatically on startup.

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: grbac
      POSTGRES_PASSWORD: grbac
      POSTGRES_DB: grbac
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grbac -d grbac"]
      interval: 3s
      timeout: 3s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.0
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://grbac:grbac@postgres:5432/grbac?sslmode=disable
    command: ["-path", "/migrations", "-database", "postgres://grbac:grbac@postgres:5432/grbac?sslmode=disable", "up"]
    volumes:
      - ./internal/db/migrations:/migrations:ro

  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      SERVER_ADDR: ":8080"
      DATABASE_URL: postgres://grbac:grbac@postgres:5432/grbac?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
