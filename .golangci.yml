# golangci-lint config — RBAC for Microservices
# Tech Lead: production-ready, opinionated

run:
  timeout: 5m
  modules-download-mode: readonly
  go: '1.22'

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
  disable: []

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/grbac/grbac

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
      text: "Error return value is not checked"
  max-issues-per-linter: 50
  max-same-issues: 3

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
