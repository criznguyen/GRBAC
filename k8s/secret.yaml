# Replace values with your own (base64-encoded).
# Example: echo -n 'postgres://user:pass@host:5432/grbac?sslmode=disable' | base64
apiVersion: v1
kind: Secret
metadata:
  name: grbac-secret
  namespace: grbac
  labels:
    app: grbac
type: Opaque
stringData:
  DATABASE_URL: "postgres://grbac:grbac@postgres:5432/grbac?sslmode=disable"
  JWT_SECRET: "change-me-in-production"
